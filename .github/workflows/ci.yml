name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    name: Lint and Format
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black mypy flake8 pylint

      - name: Run ruff linter
        run: ruff check .

      - name: Run black formatter check
        run: black --check .

      - name: Run flake8 linter
        run: flake8 . || true

      - name: Run pylint
        run: pylint --disable=all --enable=security,import-error . || true

      - name: Run mypy type checker
        run: mypy . --ignore-missing-imports --explicit-package-bases || true

  test:
    runs-on: ubuntu-latest
    name: Test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        env:
          PYTHONPATH: .
        run: pytest

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
        continue-on-error: true

  build-docker:
    runs-on: ubuntu-latest
    name: Build Docker Images
    needs: [lint-and-format, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Core API image
        run: docker build -f Dockerfile --target api -t core-api:latest .

      - name: Build Dashboard image
        run: docker build -f Dockerfile --target ui -t dashboard:latest .

  integration-test:
    runs-on: ubuntu-latest
    name: Integration Tests
    needs: [build-docker]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start the stack
        run: docker compose up -d --build

      - name: Wait for the Core API
        run: timeout 300 bash -c 'until curl -fs http://localhost:8000/health; do sleep 5; done'

      - name: Smoke-test unified endpoints
        run: |
          curl -fs http://localhost:8000/health
          curl -fs "http://localhost:8000/v1/trends/top?k=5"
          curl -fs -X POST http://localhost:8000/v1/trends/search \
               -H "Content-Type: application/json" \
               -d '{"query": "the", "limit": 5}'

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs

      - name: Stop the stack
        if: always()
        run: docker compose down
