version: '3.8'

# Demo override for the unified stack. Runs the Core API and Dashboard in
# demo mode against a local SQLite database, so no PostgreSQL is required.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.demo.yml up core-api dashboard

services:
  core-api:
    environment:
      - ENV=demo
      - LOG_LEVEL=INFO
      - NEURO_DEMO_MODE=true
      - DB_URL=sqlite:////app/data/trends.db
      - EMBEDDING_MODEL=all-MiniLM-L6-v2
    depends_on: []

  dashboard:
    environment:
      - ENV=demo
      - LOG_LEVEL=INFO
      - CORE_API_URL=http://core-api:8000
